name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # NOTE: 3.14 omitted — tree-sitter wheels for 3.14 not universally
        # published across all three OS as of 2026-04. Re-add once verified.
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e .[dev]

      - name: Run unit tests (no Docling)
        run: >
          pytest tests/ -v
          --ignore=tests/test_pdf_ocr_extraction.py
          --ignore=tests/test_pdf_native_extraction.py
          --ignore=tests/test_docx_extraction.py
          --ignore=tests/test_pptx_html_extraction.py
          --ignore=tests/test_epub_extraction.py
          --ignore=tests/test_extract_with_docling.py
          --ignore=tests/test_page_metadata.py
          --ignore=tests/test_per_heading_page.py

  integration-tests:
    name: Integration tests (ubuntu / py3.13)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install all dependencies (including Docling)
        run: pip install -e .[all]

      - name: Run full test suite
        run: pytest tests/ -v
